version: "3.9"

services:
  api:
    build: .
    container_name: sidehustle_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./sidehustle.db
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEBUG=${DEBUG:-False}
    volumes:
      - ./:/app
    restart: unless-stopped
